name: Publish to Thunderstore

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}' -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Verify tag matches manifest.json
        shell: pwsh
        run: |
          $manifest = Get-Content -Raw -Path manifest.json | ConvertFrom-Json
          if ($manifest.version_number -ne '${{ steps.version.outputs.version }}') {
            throw "Tag ${{ github.ref_name }} does not match manifest.json version_number ($($manifest.version_number)). Bump manifest.json before tagging."
          }

      - name: Build release zips
        shell: pwsh
        run: ./release.ps1

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: thunderstore-zip
          path: dist/balatro-best-hand-thunderstore-v${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: thunderstore-zip
          path: dist

      - name: Upload to Thunderstore
        uses: GreenTF/upload-thunderstore-package@v4.3
        with:
          namespace: JCMexplains
          community: balatro
          name: BestHandAdvisor
          description: Predicts the highest-scoring play from your current hand, accounting for jokers, enhancements, editions, seals, and most boss blinds.
          version: ${{ needs.build.outputs.version }}
          token: ${{ secrets.THUNDERSTORE_TOKEN }}
          file: dist/balatro-best-hand-thunderstore-v${{ needs.build.outputs.version }}.zip
          # Workaround for entrypoint.sh bug in GreenTF v4.3: when `repo`
          # is unset, the action passes --repository "" to tcli, which
          # then resolves to "file:443" and fails DNS. Setting `repo` to
          # any non-empty value triggers the elif branch which hardcodes
          # https://thunderstore.io.
          repo: https://thunderstore.io
          categories: |
            Mods
